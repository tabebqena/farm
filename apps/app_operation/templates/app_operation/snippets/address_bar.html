<div>
  <h2 class="mb-0">{{ operation.get_operation_type_display }}</h2>
  <p class="text-muted">Voucher #{{ operation.pk }} | Date: {{ operation.date }}</p>
</div>
<div class="btn-group">
  {% if not operation.source.is_virtual %}
    <a href="{% url 'operation_list_view' operation.source.pk %}" class="btn btn-primary me-1">{{ operation.source }} Operations</a>
  {% endif %}
  {% if not operation.destination.is_virtual %}
    <a href="{% url 'operation_list_view' operation.destination.pk %}" class="btn btn-secondary ms-1">{{ operation.destination }} Operations</a>
  {% endif %}

  <button onclick="window.print()" class="btn btn-outline-dark ms-1"><i class="bi bi-printer"></i> Print</button>
</div>
