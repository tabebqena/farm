{% if config.is_partially_payable %}
  <div class="col-12">
    <div class="card border-warning bg-light mb-3 shadow-sm">
      <div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <label class="form-label fw-bold text-dark mb-0">
            <i class="bi bi-pie-chart-fill text-warning me-2"></i>
            Payment Terms
          </label>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="enable-partial" name="is_partial" />
            <label class="form-check-label small fw-bold" for="enable-partial">Partial Payment</label>
          </div>
        </div>
        <div id="partial-payment-container" style="opacity: 0.3">
          <div id="partial-payment-input" class="d-none">
            <div class="row g-2 align-items-center">
              <div class="col-md-6">
                <div class="input-group">
                  <span class="input-group-text bg-warning text-white border-warning">Paid Now $</span>
                  <input type="number" step="0.01" name="amount_paid" id="id_amount_paid" class="form-control border-warning" placeholder="0.00" />
                </div>
              </div>
              <div class="col-md-6">
                <div class="ps-2">
                  <small class="text-muted d-block">Remaining Balance:</small>
                  <span id="remaining-balance-text" class="fw-bold text-danger">$ 0.00</span>
                </div>
              </div>
            </div>
          </div>
          <div id="payment-error" class="small text-danger text-muted border-danger d-none">
            <i class="bi bi-exclamation-circle-fill text-danger me-1"></i>
            <span id="payment-error-text"></span>
          </div>
        </div>
        {% comment '' %}
        <div id="full-payment-notice" class="small text-muted">
          <i class="bi bi-check-circle-fill text-success me-1"></i>
          Recording as full payment of total amount.
        </div>
        {% endcomment %}
      </div>
    </div>
  </div>
{% endif %}
