{% if formset %}
  <div class="col-12">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <label class="form-label fw-bold mb-0">Items</label>
      <button type="button" class="btn btn-sm btn-outline-{{ theme_color }}" id="add-item-row">
        <i class="bi bi-plus-lg"></i>
        Add Item
      </button>
    </div>

    <div class="table-responsive border rounded">
      {{ formset.management_form }}
      <table class="table table-hover align-middle mb-0" id="items-table">
        <thead class="table-light">
          <tr>
            <th>Product Name</th>
            <th style="width: 120px">Qty</th>
            <th style="width: 150px">Unit Price</th>
            <th style="width: 150px">Total</th>
            <th style="width: 50px"></th>
          </tr>
        </thead>
        <tbody id="item-formset-body">
          {% for item_form in formset %}
            <tr class="item-row">
              <td>
                {% for field in item_form.hidden_fields %}
                  {{ field }}
                {% endfor %}
                <input type="text" name="{{ item_form.product_name.html_name }}" class="form-control form-control-sm" placeholder="Item name" required />
              </td>
              <td>
                <input type="number" name="{{ item_form.quantity.html_name }}" class="form-control form-control-sm qty-input" step="0.01" value="1" required />
              </td>
              <td>
                <input type="number" name="{{ item_form.unit_price.html_name }}" class="form-control form-control-sm price-input" step="0.01" placeholder="0.00" required />
              </td>
              <td class="row-total fw-bold text-muted">$ 0.00</td>
              <td class="text-center">
                <button type="button" class="btn btn-link text-danger p-0 remove-row"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endif %}
