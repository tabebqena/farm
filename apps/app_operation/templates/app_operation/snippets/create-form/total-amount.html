<div class="col-md-6">
  {% if has_invoice %}
    <label class="form-label fw-bold text-muted">Total Amount</label>
  {% else %}
    <label class="form-label fw-bold">Total Amount</label>
  {% endif %}
  <div class="input-group amount-input-group {% if has_invoice %}text-muted{% endif %}">
    <span class="input-group-text bg-{{ theme_color }} text-white border-{{ theme_color }}">$</span>

    {% if has_invoice %}
      <input type="number" step="0.01" name="amount" id="id_total_amount" class="form-control border-{{ theme_color }} amount-input text-muted" value="{{ amount }}" placeholder="0.00" min="0" inputmode="decimal" readonly />
    {% else %}
      <input type="number" step="0.01" name="amount" id="id_total_amount" class="form-control border-{{ theme_color }} amount-input" value="{{ amount }}" placeholder="0.00" min="0" inputmode="decimal" required />
    {% endif %}
  </div>
</div>
