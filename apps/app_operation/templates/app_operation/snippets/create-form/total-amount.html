{% comment %} {% if not has_invoice %}
  {% endcomment %}
  <div class="col-md-6">
    {% if has_invoice %}
      <label class="form-label fw-bold text-muted">Total Amount</label>
    {% else %}
      <label class="form-label fw-bold">Total Amount</label>
    {% endif %}
    <div class="input-group text-muted">
      <span class="input-group-text bg-{{ theme_color }} text-white border-{{ theme_color }}">$</span>

      {% if has_invoice %}
        <input type="number" step="1" name="amount" id="id_total_amount" class="form-control border-{{ theme_color }} text-muted" value="{{ amount }}" placeholder="0.00" min="0" readonly />
      {% else %}
        <input type="number" step="1" name="amount" id="id_total_amount" class="form-control border-{{ theme_color }} " value="{{ amount }}" placeholder="0.00" min="0" required />
      {% endif %}
    </div>
  </div>
  {% comment %}
{% endif %} {% endcomment %}
