{% if entity.category %}
  <div class="undismissable alert alert-light border shadow-sm d-flex align-items-center mb-4 py-2 px-3">
    <div class="me-3 text-primary fs-4">
      <i class="bi bi-diagram-3-fill"></i>
    </div>

    <div class="flex-grow-1">
      <h6 class="mb-0 text-uppercase small fw-bold text-muted" style="letter-spacing: 0.05rem;">Sub-Account of</h6>
      <div class="d-flex align-items-center mt-1">
        <a href="{% url 'entity_detail' entity.category.parent_entity.id %}" class="text-decoration-none fw-bold h5 mb-0 text-dark hover-primary">{{ entity.category.parent_entity.get_display_name }}</a>

        {% if entity.category.parent_entity.project %}
          <span class="badge rounded-pill bg-info-subtle text-info ms-2 small">Project</span>
        {% elif entity.category.parent_entity.person %}
          <span class="badge rounded-pill bg-warning-subtle text-warning ms-2 small">Person</span>
        {% endif %}
      </div>
    </div>

    <div class="ms-auto">
      <a href="{% url 'entity_detail' entity.category.parent_entity.id %}" class="btn btn-sm btn-outline-primary shadow-sm">View Parent <i class="bi bi-arrow-right ms-1"></i></a>
    </div>
  </div>
{% endif %}
