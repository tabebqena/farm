{% extends 'base.html' %}
{% load i18n %}

{% block content %}
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow border-0">
          <div class="card-body p-4">
            <h3 class="fw-bold mb-3">{% trans "Login" %}</h3>

            {% if form.errors %}
              <div class="alert alert-danger small">{% trans "Your username and password didn't match." %}</div>
            {% endif %}
            <form method="post" action="{% url 'login' %}?next={{ request.get_full_path|urlencode }}">
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label small fw-bold">{% trans "Username" %}</label>
                {{ form.username }}
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold">{% trans "Password" %}</label>
                {{ form.password }}
              </div>
              <button type="submit" class="btn btn-primary w-100">{% trans "Sign In" %}</button>
              <input type="hidden" name="next" value="{{ next }}" />
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
