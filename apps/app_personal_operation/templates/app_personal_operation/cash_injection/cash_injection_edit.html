{% extends 'base.html' %}

{% block content %}
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow border-0">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Edit Record #{{ object.pk }}</h5>
          </div>
          <div class="card-body">
            <div class="alert alert-secondary small">
              <strong>Financial lock:</strong> Amount (${{ object.amount }}) and Funds cannot be modified. To fix financial errors, use the <strong>Reverse</strong> function.
            </div>

            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label fw-bold">Effective Date</label>
                <input type="date" name="date" class="form-control" value="{{ form.date.value|date:'Y-m-d' }}" />
              </div>
              <div class="mb-4">
                <label class="form-label fw-bold">Notes / Description</label>
                <textarea name="description" class="form-control" rows="5">{{ form.description.value }}</textarea>
              </div>
              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Update Entry</button>
                <a href="{% url 'operation_detail_view' object.pk %}" class="btn btn-link text-muted">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
