{% load i18n %}

{% if show_navigation %}
  <nav class="navbar navbar-expand-lg bg-light border-bottom mb-4" aria-label="Views navigation">
    <div class="container-fluid px-0 ms-2 me-2">
      <!-- Parent breadcrumb -->
      {% if parent %}
        <div class="breadcrumb-nav me-auto">
          <small class="text-muted text-uppercase fw-bold ls-1">{% trans 'Parent' %}</small>
          <div class="mt-1">
            <a href="{{ parent.url }}" class="btn btn-sm btn-link text-muted p-0">
              <i class="bi {{ icon }} me-1"></i>
              {{ parent.title }}
            </a>
          </div>
        </div>
      {% endif %}

      <!-- Current view title -->
      <div class="current-view mx-3 d-none d-lg-block">
        <small class="text-muted text-uppercase fw-bold ls-1">{% trans 'Current' %}</small>
        <div class="mt-1">
          <span class="badge bg-primary-subtle text-primary border border-primary-subtle"><i class="bi {{ icon }} me-1"></i>{{ title }}</span>
        </div>
      </div>

      <!-- Related/Sibling views -->
      {% if related_views %}
        <div class="related-views ms-auto">
          <small class="text-muted text-uppercase fw-bold ls-1">{% trans 'Related' %}</small>
          <div class="mt-1 d-flex gap-2 flex-wrap">
            {% for view in related_views %}
              <a href="{{ view.url }}" class="btn btn-sm btn-outline-secondary">{{ view.title }}</a>
            {% endfor %}
          </div>
        </div>
      {% endif %}
    </div>
  </nav>
{% endif %}
